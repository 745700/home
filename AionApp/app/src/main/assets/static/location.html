<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>定位地图 - Aion</title>
<link rel="stylesheet" href="common.css">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8359">
<style>
.loc-panel-status { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.loc-stat { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px 10px; flex:1; min-width:120px; }
.loc-stat-label { display:block; font-size:10px; color:var(--text3); }
.loc-stat-val { font-size:13px; color:var(--text); }
.loc-cfg-section { margin-top:12px; }
.loc-cfg-section h4 { font-size:13px; color:var(--accent); cursor:pointer; padding:6px 0; user-select:none; }
.loc-cfg-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.loc-cfg-row label { font-size:12px; color:var(--text); display:flex; align-items:center; gap:4px; }
.loc-cfg-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.loc-cfg-grid label { font-size:11px; color:var(--text3); display:block; margin-bottom:2px; }
.loc-cfg-grid input { width:100%; padding:5px 6px; font-size:12px; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; box-sizing:border-box; outline:none; }
.loc-poi-section { margin-top:12px; }
.loc-poi-category h5 { font-size:13px; color:var(--text); margin:8px 0 4px; }
.poi-count { font-size:11px; color:var(--text3); }
.loc-poi-list { display:flex; flex-direction:column; gap:4px; }
.loc-poi-item { display:flex; gap:8px; padding:6px 4px; border-bottom:1px solid var(--border); }
.loc-poi-item:last-child { border-bottom:none; }
.loc-poi-thumb { width:40px; height:40px; border-radius:6px; object-fit:cover; flex-shrink:0; }
.loc-poi-thumb-placeholder { width:40px; height:40px; border-radius:6px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.loc-poi-info { flex:1; min-width:0; }
.loc-poi-name { font-size:13px; font-weight:600; }
.loc-poi-meta { font-size:11px; color:var(--text2); margin-top:1px; }
.loc-poi-addr { font-size:11px; color:var(--text3); margin-top:1px; }
.poi-rating { color:#f59e0b; }
.poi-cost { color:#ef4444; }
.loc-poi-empty { padding:16px; text-align:center; color:var(--text3); font-size:13px; }
</style>
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="AionNavigator.goBack()">⬅</button>
    <h2>📍 定位地图</h2>
  </div>
  <div class="page-content">
    <!-- 状态概览 -->
    <div class="loc-panel-status">
      <div class="loc-stat"><span class="loc-stat-label">状态</span> <span class="loc-stat-val" id="lpState">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">位置</span> <span class="loc-stat-val" id="lpAddr">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">距家</span> <span class="loc-stat-val" id="lpDist">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">天气</span> <span class="loc-stat-val" id="lpWeather">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">步数</span> <span class="loc-stat-val" id="lpSteps">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">更新</span> <span class="loc-stat-val" id="lpTime">--</span></div>
    </div>
    <!-- 立即同步按钮 + 手机同步 -->
    <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
      <button id="btnForceSync" class="btn-save" style="flex:1;font-size:13px;padding:8px 0" onclick="forceSync()">🔄 同步位置</button>
      <button id="btnPhoneSync" class="btn-save" style="flex:1;font-size:13px;padding:8px 0;background:var(--surface2);color:var(--text)" onclick="phoneSync()">📱 同步手机步数</button>
      <button class="btn-save" style="font-size:11px;padding:8px 6px;background:var(--surface2);color:var(--text3)" onclick="stepDiag()">🔧</button>
    </div>
    <div id="stepDiagInfo" style="display:none;font-size:11px;color:var(--text3);background:var(--surface2);padding:6px 8px;border-radius:6px;margin-bottom:10px;word-break:break-all"></div>
    <!-- 配置区 -->
    <div class="loc-cfg-section">
      <h4 onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('span').textContent=this.nextElementSibling.style.display==='none'?'▶':'▼'">⚙ 配置 <span>▼</span></h4>
      <div id="locCfgBody">
        <div class="loc-cfg-row">
          <label><input type="checkbox" id="lp_enabled" style="accent-color:var(--accent)"> 启用定位</label>
          <label><input type="checkbox" id="lp_quiet" style="accent-color:var(--accent)"> 静默时段</label>
          <input type="time" id="lp_qstart" value="00:00" style="width:70px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:11px">
          <span style="color:var(--text3);font-size:11px">~</span>
          <input type="time" id="lp_qend" value="08:00" style="width:70px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:11px">
        </div>
        <div style="margin-bottom:6px">
          <label style="font-size:11px;color:var(--text3)">高德 Web服务 API Key</label>
          <input type="text" id="lp_amap_key" placeholder="32位十六进制" autocomplete="off" class="form-input" style="font-size:12px;padding:5px 6px">
        </div>
        <div class="loc-cfg-grid">
          <div><label>家经度</label><input type="text" id="lp_home_lng" placeholder="经度" autocomplete="off"></div>
          <div><label>家纬度</label><input type="text" id="lp_home_lat" placeholder="纬度" autocomplete="off"></div>
          <div><label>离家阈值(m)</label><input type="number" id="lp_threshold" placeholder="500" autocomplete="off"></div>
          <div><label>POI半径(m)</label><input type="number" id="lp_poi_radius" placeholder="2000" autocomplete="off"></div>
        </div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="btn-save" style="font-size:11px;padding:4px 10px;flex:1" onclick="saveLocPanel()">💾 保存配置</button>
          <button class="btn-save" style="font-size:11px;padding:4px 10px;flex:1;background:var(--surface2);color:var(--text)" onclick="setHomeLoc()">📍 用当前定位设为家</button>
        </div>
        <div id="lpCfgMsg" style="font-size:11px;color:var(--text2);margin-top:4px"></div>
      </div>
    </div>
    <!-- POI 列表 -->
    <div class="loc-poi-section">
      <h4 style="margin:0 0 8px;font-size:13px;color:var(--accent)">📌 周边 POI</h4>
      <div id="locPoiContent"><div class="loc-poi-empty">暂无 POI 数据（外出时自动搜索）</div></div>
    </div>
  </div>
</div>
<script src="common.js"></script>
<script>
connectCommonWS(msg => {
  if (msg.type === "location_update" && msg.data) {
    updateLocPanelStatus(msg.data);
    if (msg.data.nearby_pois) renderLocPois(msg.data.nearby_pois);
  }
  if (msg.type === "step_diag" && msg.info) {
    const el = $("stepDiagInfo");
    el.style.display = "block";
    el.textContent = msg.info;
  }
});

(async function init() {
  await loadLocPanel();
})();

// ── 离线版定位：用 localStorage 存储配置 ──
function getLocCfg() {
  try {
    return JSON.parse(localStorage.getItem('aion_loc_cfg') || '{}');
  } catch(e) { return {}; }
}
function saveLocCfg(cfg) {
  localStorage.setItem('aion_loc_cfg', JSON.stringify(cfg));
}
function getLocStatus() {
  try {
    return JSON.parse(localStorage.getItem('aion_loc_status') || '{}');
  } catch(e) { return {}; }
}
function saveLocStatus(st) {
  localStorage.setItem('aion_loc_status', JSON.stringify(st));
}
function getSettings() {
  try {
    return JSON.parse(localStorage.getItem('settings') || '{}');
  } catch(e) { return {}; }
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadLocPanel() {
  const cfg = getLocCfg();
  $("lp_enabled").checked = cfg.enabled || false;
  $("lp_amap_key").value = cfg.amap_key || "";
  $("lp_home_lng").value = cfg.home_lng || "";
  $("lp_home_lat").value = cfg.home_lat || "";
  $("lp_threshold").value = cfg.home_threshold || 500;
  $("lp_poi_radius").value = cfg.poi_radius || 2000;
  $("lp_quiet").checked = cfg.quiet_hours_enabled || false;
  $("lp_qstart").value = cfg.quiet_hours_start || "00:00";
  $("lp_qend").value = cfg.quiet_hours_end || "08:00";

  const st = getLocStatus();
  updateLocPanelStatus(st);
  renderLocPois(st.nearby_pois || {});
}

function updateLocPanelStatus(s) {
  if (!s || !s.lng) { $("lpState").textContent = "未知"; return; }
  const stateMap = {at_home:"🏠 在家", outside:"🚶 外出", unknown:"❓ 未知"};
  $("lpState").textContent = stateMap[s.state] || s.state || "❓ 未知";
  $("lpAddr").textContent = s.address || s.ai_analysis || "--";
  if (s.distance_from_home > 0) {
    const d = s.distance_from_home;
    $("lpDist").textContent = d >= 1000 ? (d/1000).toFixed(1)+'km' : Math.round(d)+'m';
  } else {
    $("lpDist").textContent = "--";
  }
  if (s.weather && s.weather.weather) $("lpWeather").textContent = `${s.weather.weather} ${s.weather.temperature}°C`;
  else $("lpWeather").textContent = "--";
  if (s.steps != null && s.steps !== undefined) $("lpSteps").textContent = `🚶 ${s.steps} 步`;
  else $("lpSteps").textContent = "--";
  if (s.updated_at) $("lpTime").textContent = new Date(s.updated_at * 1000).toLocaleTimeString();
  else $("lpTime").textContent = "--";
}

function renderLocPois(pois) {
  const el = $("locPoiContent");
  if (!pois || !Object.keys(pois).length) { el.innerHTML = '<div class="loc-poi-empty">暂无 POI 数据（外出时自动搜索）</div>'; return; }
  const typeIcons = {"餐饮美食":"🍜","风景名胜":"🏞️","休闲娱乐":"🎮","购物":"🛒","酒店住宿":"🏨","生活服务":"🔧"};
  let html = '';
  for (const [category, items] of Object.entries(pois)) {
    if (!items || !items.length) continue;
    const icon = typeIcons[category] || "📍";
    html += `<div class="loc-poi-category"><h5>${icon} ${escHtml(category)} <span class="poi-count">(${items.length})</span></h5><div class="loc-poi-list">`;
    for (const p of items) {
      const dist = p.distance ? `${parseInt(p.distance)}m` : '';
      const photoUrl = (p.photos && p.photos.length) ? p.photos[0] : '';
      const thumb = photoUrl ? `<img class="loc-poi-thumb" src="${escHtml(photoUrl)}" alt="" onerror="this.outerHTML='<div class=\'loc-poi-thumb-placeholder\'>📍</div>'">` : '<div class="loc-poi-thumb-placeholder">📍</div>';
      let meta = '';
      if (dist) meta += dist;
      if (p.rating && p.rating !== '[]') meta += (meta ? ' · ' : '') + `<span class="poi-rating">⭐${p.rating}</span>`;
      if (p.cost && p.cost !== '[]') meta += (meta ? ' · ' : '') + `<span class="poi-cost">¥${p.cost}</span>`;
      if (p.tel) meta += (meta ? ' · ' : '') + `📞${p.tel}`;
      html += `<div class="loc-poi-item">${thumb}<div class="loc-poi-info"><div class="loc-poi-name">${escHtml(p.name)}</div><div class="loc-poi-meta">${meta}</div>${p.address && p.address !== '[]' ? `<div class="loc-poi-addr">${escHtml(p.address)}</div>` : ''}</div></div>`;
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}

async function saveLocPanel() {
  const cfg = {
    enabled: $("lp_enabled").checked,
    quiet_hours_enabled: $("lp_quiet").checked,
    quiet_hours_start: $("lp_qstart").value,
    quiet_hours_end: $("lp_qend").value,
    amap_key: $("lp_amap_key").value.trim(),
    home_lng: parseFloat($("lp_home_lng").value) || null,
    home_lat: parseFloat($("lp_home_lat").value) || null,
    home_threshold: parseInt($("lp_threshold").value) || 500,
    poi_radius: parseInt($("lp_poi_radius").value) || 2000
  };
  saveLocCfg(cfg);
  $("lpCfgMsg").textContent = "✅ 已保存";
  setTimeout(() => $("lpCfgMsg").textContent = "", 2000);
}

async function forceSync() {
  const btn = $("btnForceSync");
  btn.disabled = true;
  btn.textContent = "⏳ 同步中...";
  const cfg = getLocCfg();
  const settings = getSettings();

  if (!cfg.enabled) {
    $("lpCfgMsg").textContent = "⚠️ 定位未启用，请先在配置中开启";
    btn.disabled = false; btn.textContent = "🔄 同步位置";
    return;
  }

  // 检查静默时段
  if (cfg.quiet_hours_enabled) {
    const now = new Date();
    const cur = now.getHours()*60 + now.getMinutes();
    const [qsH,qsM] = (cfg.quiet_hours_start||'00:00').split(':').map(Number);
    const [qeH,qeM] = (cfg.quiet_hours_end||'08:00').split(':').map(Number);
    const qStart = qsH*60+qsM, qEnd = qeH*60+qeM;
    const inQuiet = qStart < qEnd ? (cur >= qStart && cur < qEnd) : (cur >= qStart || cur < qEnd);
    if (inQuiet) {
      $("lpCfgMsg").textContent = "⏰ 当前处于静默时段，跳过定位";
      btn.disabled = false; btn.textContent = "🔄 同步位置";
      return;
    }
  }

  // 获取浏览器 GPS 定位
  try {
    const pos = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error("浏览器不支持定位")); return; }
      navigator.geolocation.getCurrentPosition(resolve, reject, {enableHighAccuracy:true, timeout:15000});
    });
    const lng = pos.coords.longitude;
    const lat = pos.coords.latitude;
    $("lpCfgMsg").textContent = `📡 定位成功: ${lng.toFixed(4)}, ${lat.toFixed(4)}，正在 AI 分析...`;

    // 用 SiliconFlow Qwen2.5-7B 分析位置
    const apiKey = settings.sentinel_api_key || settings.siliconflow_key || '';
    const baseUrl = settings.sentinel_base_url || 'https://api.siliconflow.cn';
    const model = settings.sentinel_model || 'Qwen/Qwen2.5-7B-Instruct';

    let state = 'unknown', aiAnalysis = '--', address = '--';
    if (apiKey) {
      try {
        const homeLng = cfg.home_lng, homeLat = cfg.home_lat;
        const distFromHome = (homeLng && homeLat)
          ? Math.round(Math.sqrt(Math.pow((lng-homeLng)*111320*Math.cos(homeLat*Math.PI/180),2)+Math.pow((lat-homeLat)*110574,2)))
          : 0;

        const prompt = `你是一个位置分析助手。用户当前 GPS 坐标: 经度 ${lng.toFixed(4)}, 纬度 ${lat.toFixed(4)}。` +
          (homeLng ? ` 家坐标: 经度 ${homeLng.toFixed(4)}, 纬度 ${homeLat.toFixed(4)}，距家约 ${distFromHome} 米。` : '') +
          ` 请分析并用 JSON 格式回复，包含以下字段（只返回 JSON，不要其他文字）：` +
          `{"state":"at_home 或 outside 或 unknown","ai_analysis":"一句话描述当前位置，如'在家'、'在公司'、'在XX商场'等","address":"猜测的具体地址或位置名称（20字以内）"}`;

        const aiRes = await fetch(baseUrl + '/v1/chat/completions', {
          method: 'POST',
          headers: {'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json'},
          body: JSON.stringify({model, messages:[{role:'user',content:prompt}], max_tokens:150, temperature:0.3})
        });
        if (aiRes.ok) {
          const aiData = await aiRes.json();
          let raw = aiData.choices?.[0]?.message?.content || '';
          // 提取 JSON
          const jsonMatch = raw.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            const parsed = JSON.parse(jsonMatch[0]);
            state = parsed.state || 'unknown';
            aiAnalysis = parsed.ai_analysis || '--';
            address = parsed.address || '--';
          }
        }
      } catch(e) {
        console.warn('[Location] AI 分析失败:', e);
        $("lpCfgMsg").textContent = `⚠️ AI 分析失败: ${e.message}`;
      }
    }

    const st = {
      lng, lat,
      state,
      address,
      ai_analysis: aiAnalysis,
      distance_from_home: (cfg.home_lng && cfg.home_lat)
        ? Math.round(Math.sqrt(Math.pow((lng-cfg.home_lng)*111320*Math.cos(cfg.home_lat*Math.PI/180),2)+Math.pow((lat-cfg.home_lat)*110574,2)))
        : 0,
      updated_at: Date.now()/1000
    };
    saveLocStatus(st);
    updateLocPanelStatus(st);
    $("lpCfgMsg").textContent = `✅ 同步完成: ${aiAnalysis}`;
    btn.textContent = "✅ 已同步";
  } catch(e) {
    $("lpCfgMsg").textContent = "❌ " + e.message;
    btn.textContent = "❌ 失败";
  }
  setTimeout(() => { btn.disabled = false; btn.textContent = "🔄 同步位置"; }, 2500);
}

async function phoneSync() {
  // 通知 App 上报步数（通过 WS 或原生桥）
  const btn = $("btnPhoneSync");
  btn.disabled = true;
  btn.textContent = "⏳ 请求中...";
  if (window.AionPhoneScreen && window.AionPhoneScreen.requestStepSync) {
    try {
      await window.AionPhoneScreen.requestStepSync();
      btn.textContent = "📡 已发送";
    } catch(e) {
      btn.textContent = "❌ " + e.message;
    }
  } else {
    btn.textContent = "App 不可用";
  }
  setTimeout(() => { btn.disabled = false; btn.textContent = "📱 同步手机步数"; }, 4000);
}

function stepDiag() {
  const el = $("stepDiagInfo");
  el.style.display = "block";
  el.textContent = "ℹ️ 步数数据来自手机 App 心跳上报，需在 App 内开启步数权限";
}

async function setHomeLoc() {
  $("lpCfgMsg").textContent = "📡 正在获取浏览器定位...";
  try {
    const pos = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error("浏览器不支持定位")); return; }
      navigator.geolocation.getCurrentPosition(resolve, reject, {enableHighAccuracy:true, timeout:15000});
    });
    const lng = pos.coords.longitude;
    const lat = pos.coords.latitude;
    const cfg = getLocCfg();
    cfg.home_lng = lng;
    cfg.home_lat = lat;
    saveLocCfg(cfg);
    $("lp_home_lng").value = lng.toFixed(6);
    $("lp_home_lat").value = lat.toFixed(6);
    $("lpCfgMsg").textContent = `✅ 已设为家：${lng.toFixed(4)}, ${lat.toFixed(4)}`;
    loadLocPanel();
  } catch(e) {
    $("lpCfgMsg").textContent = "❌ " + e.message;
  }
}

</script>

</body>
</html>
