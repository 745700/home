<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💰 账本</title>
<link rel="stylesheet" href="common.css">
<style>
body { background: #f5f5f5; }
.sub-page { background: #f5f5f5; }
.top-bar { background: rgba(255,255,255,0.95); border-bottom: 1px solid #eee; }
.back-btn { color: #333; }
.top-bar h2 { color: #333; }

.tab-bar {
  display: flex;
  background: white;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 50px;
  z-index: 10;
}
.tab-bar .tab {
  flex: 1;
  text-align: center;
  padding: 12px 0;
  font-size: 14px;
  color: #888;
  border-bottom: 2px solid transparent;
  cursor: pointer;
}
.tab-bar .tab.active {
  color: #ff6b6b;
  border-bottom-color: #ff6b6b;
}

/* 总览 */
.overview-card {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  margin: 12px;
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
}
.overview-card .balance-label { font-size: 13px; opacity: 0.8; }
.overview-card .balance-amount { font-size: 36px; font-weight: 700; margin: 4px 0; }
.overview-card .income-expense { display: flex; justify-content: space-around; margin-top: 12px; font-size: 13px; }
.overview-card .income-expense .ie-item { text-align: center; }
.overview-card .income-expense .ie-val { font-size: 16px; font-weight: 600; margin-top: 2px; }
.overview-card .income-expense .ie-val.income { color: #90EE90; }
.overview-card .income-expense .ie-val.expense { color: #FFB6C1; }

/* 账户列表 */
.section-title {
  font-size: 13px;
  color: #888;
  padding: 12px 16px 6px;
  font-weight: 500;
}
.account-card {
  background: white;
  margin: 0 12px 8px;
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.account-card .acc-icon { font-size: 28px; }
.account-card .acc-info { flex: 1; }
.account-card .acc-name { font-size: 15px; font-weight: 500; color: #333; }
.account-card .acc-note { font-size: 12px; color: #aaa; margin-top: 2px; }
.account-card .acc-balance { font-size: 16px; font-weight: 600; color: #333; }

/* 账单 */
.bill-item {
  background: white;
  margin: 0 12px 6px;
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.bill-item .bill-icon { font-size: 24px; width: 40px; text-align: center; }
.bill-item .bill-info { flex: 1; }
.bill-item .bill-title { font-size: 14px; color: #333; }
.bill-item .bill-date { font-size: 11px; color: #aaa; margin-top: 2px; }
.bill-item .bill-amount { font-size: 15px; font-weight: 600; }
.bill-item .bill-amount.income { color: #4CAF50; }
.bill-item .bill-amount.expense { color: #FF5252; }

/* 红包 */
.redpacket-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px;
}
.redpacket-card {
  background: linear-gradient(135deg, #ff6b6b, #ff8e53);
  border-radius: 12px;
  padding: 16px;
  color: white;
  text-align: center;
  cursor: pointer;
  position: relative;
}
.redpacket-card.used { opacity: 0.5; }
.redpacket-card .rp-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.redpacket-card .rp-amount { font-size: 22px; font-weight: 700; }
.redpacket-card .rp-label { font-size: 11px; opacity: 0.8; margin-top: 4px; }
.redpacket-card .rp-badge {
  position: absolute;
  top: 6px;
  right: 8px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 10px;
}

/* 对话框 */
.dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.dialog-overlay.show { display: flex; }
.dialog-sheet {
  background: white;
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 500px;
  padding: 16px 16px 32px;
  animation: slideUp 0.25s ease;
}
.dialog-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 16px; color: #333; }
.dialog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.dialog-label { font-size: 13px; color: #666; width: 60px; flex-shrink: 0; }
.dialog-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; }
.dialog-input:focus { border-color: #ff6b6b; }
.dialog-actions { display: flex; gap: 10px; margin-top: 16px; }
.btn-cancel { flex: 1; background: #f0f0f0; color: #666; border: none; border-radius: 10px; padding: 12px; font-size: 15px; cursor: pointer; }
.btn-confirm { flex: 1; background: #ff6b6b; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; cursor: pointer; }

.category-picker {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
}
.cat-btn {
  padding: 6px 12px; border-radius: 16px; font-size: 13px;
  border: 1px solid #ddd; background: white; cursor: pointer; color: #333;
}
.cat-btn.selected { background: #ff6b6b; color: white; border-color: #ff6b6b; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.add-btn-fixed {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff6b6b, #ff8e53);
  border: none;
  color: white;
  font-size: 24px;
  box-shadow: 0 4px 16px rgba(255,107,107,0.4);
  cursor: pointer;
  z-index: 50;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #aaa;
  font-size: 14px;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="window.closeSubPage ? window.closeSubPage() : history.back()">⬅</button>
    <h2>💰 账本</h2>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('overview')">总览</div>
    <div class="tab" onclick="switchTab('accounts')">账户</div>
    <div class="tab" onclick="switchTab('bills')">账单</div>
    <div class="tab" onclick="switchTab('redpackets')">红包</div>
  </div>

  <!-- 总览 -->
  <div class="tab-content active" id="tab-overview">
    <div class="overview-card">
      <div class="balance-label">💵 总资产</div>
      <div class="balance-amount" id="totalBalance">¥0.00</div>
      <div class="income-expense">
        <div class="ie-item"><div class="income-expense">本月收入</div><div class="ie-val income" id="monthIncome">+¥0</div></div>
        <div class="ie-item"><div class="income-expense">本月支出</div><div class="ie-val expense" id="monthExpense">-¥0</div></div>
      </div>
    </div>
    <div class="section-title">📊 本月消费分类</div>
    <div id="categorySummary" style="padding:0 12px;"></div>
  </div>

  <!-- 账户 -->
  <div class="tab-content" id="tab-accounts">
    <div class="section-title">我的账户</div>
    <div id="accountList"></div>
    <div class="empty-state" id="accountEmpty" style="display:none">还没有账户，添加一个吧～</div>
  </div>

  <!-- 账单 -->
  <div class="tab-content" id="tab-bills">
    <div class="section-title">📋 收支记录</div>
    <div id="billList"></div>
    <div class="empty-state" id="billEmpty" style="display:none">还没有账单记录</div>
  </div>

  <!-- 红包 -->
  <div class="tab-content" id="tab-redpackets">
    <div class="section-title">🧧 我的红包</div>
    <div id="redpacketList" class="redpacket-grid"></div>
    <div class="empty-state" id="redpacketEmpty" style="display:none">还没有红包</div>
  </div>
</div>

<!-- 悬浮添加按钮 -->
<button class="add-btn-fixed" id="addBtnFixed" onclick="openAddDialog()">+</button>

<!-- 添加对话框 -->
<div class="dialog-overlay" id="addDialog">
  <div class="dialog-sheet">
    <div class="dialog-title" id="dialogTitle">记一笔</div>

    <!-- 添加账户 -->
    <div id="dialogAccount" style="display:none">
      <div class="dialog-row">
        <div class="dialog-label">名称</div>
        <input class="dialog-input" id="accNameInput" placeholder="如：微信钱包">
      </div>
      <div class="dialog-row">
        <div class="dialog-label">余额</div>
        <input class="dialog-input" id="accBalanceInput" placeholder="0.00" type="number" step="0.01">
      </div>
      <div class="dialog-row">
        <div class="dialog-label">图标</div>
        <div class="category-picker" id="accIconPicker"></div>
      </div>
    </div>

    <!-- 添加账单 -->
    <div id="dialogBill" style="display:none">
      <div class="dialog-row">
        <div class="dialog-label">金额</div>
        <input class="dialog-input" id="billAmountInput" placeholder="0.00" type="number" step="0.01">
      </div>
      <div class="dialog-row">
        <div class="dialog-label">类型</div>
        <div style="display:flex;gap:8px;flex:1">
          <button class="cat-btn selected" id="typeExpense" onclick="setBillType('expense')" style="flex:1">支出</button>
          <button class="cat-btn" id="typeIncome" onclick="setBillType('income')" style="flex:1">收入</button>
        </div>
      </div>
      <div class="dialog-row">
        <div class="dialog-label">分类</div>
        <div class="category-picker" id="catPicker"></div>
      </div>
      <div class="dialog-row">
        <div class="dialog-label">账户</div>
        <select class="dialog-input" id="billAccountSelect"></select>
      </div>
      <div class="dialog-row">
        <div class="dialog-label">备注</div>
        <input class="dialog-input" id="billNoteInput" placeholder="可选备注">
      </div>
    </div>

    <!-- 红包 -->
    <div id="dialogRedpacket" style="display:none">
      <div class="dialog-row">
        <div class="dialog-label">总金额</div>
        <input class="dialog-input" id="rpAmountInput" placeholder="100.00" type="number" step="0.01">
      </div>
      <div class="dialog-row">
        <div class="dialog-label">红包数</div>
        <input class="dialog-input" id="rpCountInput" placeholder="5" type="number" min="1">
      </div>
      <div class="dialog-row">
        <div class="dialog-label">祝福语</div>
        <input class="dialog-input" id="rpWishInput" placeholder="恭喜发财，大吉大利">
      </div>
    </div>

    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeAddDialog()">取消</button>
      <button class="btn-confirm" id="dialogConfirmBtn" onclick="confirmAddDialog()">确定</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
const ACC_ICONS = ['💰','💳','🏦','💵','🪙','🎁','💖','🏠','🚗'];
const EXPENSE_CATS = [
  {icon:'🍜',name:'餐饮'},{icon:'🚗',name:'交通'},{icon:'🛒',name:'购物'},
  {icon:'🎮',name:'娱乐'},{icon:'📱',name:'通讯'},{icon:'🏠',name:'居住'},
  {icon:'💊',name:'医疗'},{icon:'📚',name:'教育'},{icon:'🎁',name:'人情'},
  {icon:'☁️',name:'衣服'},{icon:'✂️',name:'美容'},{icon:'📦',name:'其它'},
];
const INCOME_CATS = [
  {icon:'💰',name:'工资'},{icon:'🎁',name:'奖金'},{icon:'💵',name:'外快'},
  {icon:'💰',name:'理财'},{icon:'🎁',name:'红包'},{icon:'📦',name:'其它'},
];

let _dialogMode = 'bill'; // 'account' | 'bill' | 'redpacket'
let _billType = 'expense';
let _selectedCat = '餐饮';
let _accounts = [];
let _bills = [];
let _redpackets = [];

// Storage keys
const ACC_KEY = 'aion_fund_accounts';
const BILL_KEY = 'aion_fund_bills';
const RP_KEY = 'aion_fund_redpackets';

function _load() {
  try { _accounts = JSON.parse(localStorage.getItem(ACC_KEY) || '[]'); } catch { _accounts = []; }
  try { _bills = JSON.parse(localStorage.getItem(BILL_KEY) || '[]'); } catch { _bills = []; }
  try { _redpackets = JSON.parse(localStorage.getItem(RP_KEY) || '[]'); } catch { _redpackets = []; }
}
function _save() {
  localStorage.setItem(ACC_KEY, JSON.stringify(_accounts));
  localStorage.setItem(BILL_KEY, JSON.stringify(_bills));
  localStorage.setItem(RP_KEY, JSON.stringify(_redpackets));
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');

  const addBtn = document.getElementById('addBtnFixed');
  addBtn.style.display = (tab === 'redpackets') ? 'none' : 'flex';

  if (tab === 'overview') renderOverview();
  else if (tab === 'accounts') renderAccounts();
  else if (tab === 'bills') renderBills();
  else if (tab === 'redpackets') renderRedpackets();
}

function renderOverview() {
  const total = _accounts.reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
  document.getElementById('totalBalance').textContent = '¥' + total.toFixed(2);

  const now = new Date();
  const monthStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const monthBills = _bills.filter(b => b.date.startsWith(monthStr));
  const income = monthBills.filter(b => b.type === 'income').reduce((s, b) => s + parseFloat(b.amount), 0);
  const expense = monthBills.filter(b => b.type === 'expense').reduce((s, b) => s + parseFloat(b.amount), 0);
  document.getElementById('monthIncome').textContent = '+¥' + income.toFixed(0);
  document.getElementById('monthExpense').textContent = '-¥' + expense.toFixed(0);

  // 分类统计
  const catTotals = {};
  monthBills.filter(b => b.type === 'expense').forEach(b => {
    catTotals[b.category] = (catTotals[b.category] || 0) + parseFloat(b.amount);
  });
  const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]).slice(0, 5);
  const catEl = document.getElementById('categorySummary');
  if (sorted.length === 0) {
    catEl.innerHTML = '<div class="empty-state">本月暂无支出记录</div>';
  } else {
    const max = sorted[0][1];
    catEl.innerHTML = sorted.map(([cat, amt]) => {
      const catInfo = EXPENSE_CATS.find(c => c.name === cat) || {icon:'📦',name:cat};
      const pct = Math.round(amt / max * 100);
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:#555;margin-bottom:4px">
          <span>${catInfo.icon} ${catInfo.name}</span><span style="color:#FF5252">-¥${amt.toFixed(1)}</span>
        </div>
        <div style="height:6px;background:#eee;border-radius:3px"><div style="height:100%;width:${pct}%;background:#FF5252;border-radius:3px"></div></div>
      </div>`;
    }).join('');
  }
}

function renderAccounts() {
  const el = document.getElementById('accountList');
  const empty = document.getElementById('accountEmpty');
  if (_accounts.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  el.innerHTML = _accounts.map((a, i) => `
    <div class="account-card" onclick="editAccount(${i})">
      <div class="acc-icon">${a.icon || '💰'}</div>
      <div class="acc-info">
        <div class="acc-name">${escHtml(a.name)}</div>
        <div class="acc-note">${escHtml(a.note || '')}</div>
      </div>
      <div class="acc-balance">¥${(parseFloat(a.balance)||0).toFixed(2)}</div>
    </div>
  `).join('');
}

function renderBills() {
  const el = document.getElementById('billList');
  const empty = document.getElementById('billEmpty');
  const sorted = [..._bills].sort((a,b) => b._id - a._id);
  if (sorted.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  el.innerHTML = sorted.map(b => {
    const cat = [...EXPENSE_CATS, ...INCOME_CATS].find(c => c.name === b.category) || {icon:'📦',name:b.category};
    const sign = b.type === 'income' ? '+' : '-';
    return `<div class="bill-item" onclick="deleteBill('${b._id}')">
      <div class="bill-icon">${cat.icon}</div>
      <div class="bill-info">
        <div class="bill-title">${escHtml(b.category)} ${b.note ? '<span style="color:#aaa">· '+escHtml(b.note)+'</span>' : ''}</div>
        <div class="bill-date">${b.date} · ${escHtml(b.accountName || '')}</div>
      </div>
      <div class="bill-amount ${b.type}">${sign}¥${parseFloat(b.amount).toFixed(2)}</div>
    </div>`;
  }).join('');
}

function renderRedpackets() {
  const el = document.getElementById('redpacketList');
  const empty = document.getElementById('redpacketEmpty');
  if (_redpackets.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  el.innerHTML = _redpackets.map((rp, i) => `
    <div class="redpacket-card ${rp.used ? 'used' : ''}" onclick="openRedpacket(${i})">
      <div class="rp-badge">${rp.used ? '已用' : '未开'}</div>
      <div class="rp-title">🧧 ${escHtml(rp.wish || '恭喜发财')}</div>
      <div class="rp-amount">¥${parseFloat(rp.amount).toFixed(2)}</div>
      <div class="rp-label">${rp.count}个红包 · ${rp.opened||0}人已开</div>
    </div>
  `).join('');
}

// 对话框
function _showAddDialog(mode) {
  _dialogMode = mode || 'bill';
  document.getElementById('dialogAccount').style.display = 'none';
  document.getElementById('dialogBill').style.display = 'none';
  document.getElementById('dialogRedpacket').style.display = 'none';

  if (_dialogMode === 'account') {
    document.getElementById('dialogTitle').textContent = '添加账户';
    document.getElementById('dialogAccount').style.display = 'block';
    document.getElementById('accNameInput').value = '';
    document.getElementById('accBalanceInput').value = '';
    renderAccIconPicker();
  } else if (_dialogMode === 'bill') {
    document.getElementById('dialogTitle').textContent = '记一笔';
    document.getElementById('dialogBill').style.display = 'block';
    document.getElementById('billAmountInput').value = '';
    document.getElementById('billNoteInput').value = '';
    setBillType('expense');
    renderCatPicker();
    renderAccountSelect();
  } else if (_dialogMode === 'redpacket') {
    document.getElementById('dialogTitle').textContent = '发红包';
    document.getElementById('dialogRedpacket').style.display = 'block';
    document.getElementById('rpAmountInput').value = '';
    document.getElementById('rpCountInput').value = '5';
    document.getElementById('rpWishInput').value = '恭喜发财，大吉大利';
  }

  document.getElementById('addDialog').classList.add('show');
}

function openAddDialog(mode) {
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) {
    const tabName = activeTab.textContent.trim();
    if (tabName === '账户') { _showAddDialog('account'); return; }
    if (tabName === '账单') { _showAddDialog('bill'); return; }
  }
  _showAddDialog(mode || 'bill');
}

function closeAddDialog() {
  document.getElementById('addDialog').classList.remove('show');
}

function setBillType(type) {
  _billType = type;
  document.getElementById('typeExpense').classList.toggle('selected', type === 'expense');
  document.getElementById('typeIncome').classList.toggle('selected', type === 'income');
  renderCatPicker();
}

function renderCatPicker() {
  const cats = _billType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  document.getElementById('catPicker').innerHTML = cats.map(c =>
    `<button class="cat-btn ${_selectedCat === c.name ? 'selected' : ''}" onclick="pickCat('${c.name}')">${c.icon} ${c.name}</button>`
  ).join('');
}

function renderAccIconPicker() {
  document.getElementById('accIconPicker').innerHTML = ACC_ICONS.map(icon =>
    `<button class="cat-btn" onclick="pickAccIcon('${icon}')" style="font-size:18px">${icon}</button>`
  ).join('');
}

function pickCat(name) { _selectedCat = name; renderCatPicker(); }
let _selectedAccIcon = '💰';
function pickAccIcon(icon) { _selectedAccIcon = icon; renderAccIconPicker(); }

function renderAccountSelect() {
  const sel = document.getElementById('billAccountSelect');
  if (_accounts.length === 0) {
    sel.innerHTML = '<option value="">请先添加账户</option>';
  } else {
    sel.innerHTML = _accounts.map((a,i) => `<option value="${i}">${escHtml(a.name)}</option>`).join('');
  }
}

function confirmAddDialog() {
  if (_dialogMode === 'account') {
    const name = document.getElementById('accNameInput').value.trim();
    const balance = parseFloat(document.getElementById('accBalanceInput').value) || 0;
    if (!name) { alert('请输入账户名称'); return; }
    _accounts.push({ name, balance, icon: _selectedAccIcon, note: '' });
    _save();
    renderAccounts();
  } else if (_dialogMode === 'bill') {
    const amount = parseFloat(document.getElementById('billAmountInput').value);
    if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
    const accIdx = parseInt(document.getElementById('billAccountSelect').value);
    const acc = _accounts[accIdx] || {name:'默认'};
    const now = new Date();
    const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
    const bill = {
      _id: Date.now(),
      type: _billType,
      amount,
      category: _selectedCat,
      accountName: acc.name,
      note: document.getElementById('billNoteInput').value.trim(),
      date: dateStr,
    };
    _bills.push(bill);
    // 更新账户余额
    if (_accounts[accIdx]) {
      _accounts[accIdx].balance = parseFloat((_accounts[accIdx].balance || 0)) + (_billType === 'income' ? amount : -amount);
    }
    _save();
    renderBills();
    renderOverview();
  } else if (_dialogMode === 'redpacket') {
    const amount = parseFloat(document.getElementById('rpAmountInput').value);
    const count = parseInt(document.getElementById('rpCountInput').value) || 1;
    const wish = document.getElementById('rpWishInput').value.trim() || '恭喜发财';
    if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
    _redpackets.push({ amount, count, wish, opened: 0, used: false, createdAt: Date.now() });
    _save();
    renderRedpackets();
  }
  closeAddDialog();
  showToast('✅ 已保存');
}

function openRedpacket(idx) {
  const rp = _redpackets[idx];
  if (rp.used) { showToast('这个红包已经用过了'); return; }
  const each = (rp.amount / rp.count).toFixed(2);
  showToast(`🧧 恭喜！开出一个红包 ¥${each}`);
  rp.opened = (rp.opened || 0) + 1;
  if (rp.opened >= rp.count) rp.used = true;
  // 加到第一个账户
  if (_accounts.length > 0) {
    _accounts[0].balance = parseFloat(_accounts[0].balance || 0) + parseFloat(each);
  }
  _save();
  renderRedpackets();
  renderOverview();
}

function editAccount(idx) {
  const a = _accounts[idx];
  const newBalance = prompt('修改 ' + a.name + ' 余额：', a.balance);
  if (newBalance !== null) {
    a.balance = parseFloat(newBalance) || 0;
    _save();
    renderAccounts();
    renderOverview();
  }
}

function deleteBill(id) {
  if (!confirm('删除这条记录？')) return;
  _bills = _bills.filter(b => b._id != id);
  _save();
  renderBills();
  renderOverview();
}

// 初始化
_load();
renderOverview();
</script>
</body>
</html>
