<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱ 专注模式</title>
<link rel="stylesheet" href="common.css">
<style>
* { box-sizing: border-box; }
body { background: #1a1a2e; color: white; overflow: hidden; margin: 0; padding: 0; }
.sub-page { background: #1a1a2e; min-height: 100vh; }

/* ── 顶部导航 ── */
.top-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  background: transparent;
  border: none;
  box-shadow: none;
  position: relative; z-index: 10;
}
.back-btn {
  background: rgba(255,255,255,0.1); border: none; color: white;
  width: 36px; height: 36px; border-radius: 50%;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.top-bar h2 { color: white; font-size: 17px; font-weight: 600; margin: 0; }

/* ── 主页：中央入口 ── */
.entry-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center;
  min-height: calc(100vh - 80px);
  padding: 40px 24px;
  text-align: center;
}
.entry-icon {
  font-size: 88px; margin-bottom: 24px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.entry-title {
  font-size: 28px; font-weight: 700; margin-bottom: 12px;
  background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.entry-desc {
  font-size: 14px; color: rgba(255,255,255,0.45);
  line-height: 1.8; margin-bottom: 48px;
  max-width: 280px;
}
.entry-features {
  display: flex; flex-direction: column; gap: 14px;
  margin-bottom: 48px; width: 100%; max-width: 260px;
}
.feature-item {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 14px 18px;
  text-align: left;
}
.feature-icon { font-size: 22px; flex-shrink: 0; }
.feature-text { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }
.feature-text strong { display: block; font-size: 14px; color: white; margin-bottom: 2px; }

/* 开始专注按钮 */
.start-btn {
  width: 100%; max-width: 280px;
  padding: 18px 32px; border-radius: 40px;
  border: none; font-size: 17px; font-weight: 700;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white; cursor: pointer;
  box-shadow: 0 8px 32px rgba(102,126,234,0.4);
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.start-btn:active { transform: scale(0.97); box-shadow: 0 4px 16px rgba(102,126,234,0.3); }

/* 历史记录入口 */
.history-btn {
  margin-top: 20px;
  background: none; border: none; color: rgba(255,255,255,0.35);
  font-size: 13px; cursor: pointer; text-decoration: underline;
  text-underline-offset: 3px;
}

/* ── AI 锁屏状态（显示在 WebView 上，当原生锁屏激活时可见） ── */
.lock-status {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(26,26,46,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 16px 20px;
  z-index: 999;
  flex-direction: column; gap: 10px;
}
.lock-status.active { display: flex; }
.lock-status-bar {
  display: flex; align-items: center; justify-content: space-between;
}
.lock-status-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: rgba(255,255,255,0.5);
}
.lock-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ff5252;
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.lock-ai-msg {
  font-size: 14px; color: rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.06);
  border-radius: 10px; padding: 10px 14px;
  line-height: 1.5;
  min-height: 44px;
}
.lock-ai-msg:empty::before {
  content: '等待 AI 回复...'; color: rgba(255,255,255,0.25);
}
</style>
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="window.parent.closeSubPage()">⬅</button>
    <h2>⏱ 专注模式</h2>
  </div>

  <!-- 入口页面 -->
  <div class="entry-screen" id="entryScreen">
    <div class="entry-icon">🧘</div>
    <div class="entry-title">专注模式</div>
    <div class="entry-desc">
      锁定手机，安心专注<br>
      AI 全程掌控时长，最长 1 小时
    </div>

    <div class="entry-features">
      <div class="feature-item">
        <div class="feature-icon">🔒</div>
        <div class="feature-text">
          <strong>完全锁定</strong>
          手机变成"砖头"，无法切换 App
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">💬</div>
        <div class="feature-text">
          <strong>可发一条消息</strong>
          专注中有急事可告诉 AI
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🤖</div>
        <div class="feature-text">
          <strong>AI 智能解锁</strong>
          AI 觉得你准备好了就解锁
        </div>
      </div>
    </div>

    <button class="start-btn" onclick="requestFocus()">
      开始专注 ⏱
    </button>

    <button class="history-btn" onclick="showHistory()">
      查看专注记录
    </button>
  </div>
</div>

<!-- 锁屏状态条（原生锁激活时显示在底部） -->
<div class="lock-status" id="lockStatus">
  <div class="lock-status-bar">
    <div class="lock-status-label">
      <div class="lock-dot"></div>
      专注中 · 手机已锁定
    </div>
  </div>
  <div class="lock-ai-msg" id="lockAIMsg"></div>
</div>

<script src="common.js"></script>
<script>
// ── AionFocusLock 桥接 ──
// 当原生锁激活/解除时，更新 UI
window.AionFocusLock = window.AionFocusLock || {};

// 原生锁已激活 → 显示底部状态条
function onNativeLocked() {
  document.getElementById('lockStatus').classList.add('active');
  document.getElementById('lockAIMsg').textContent = '';
  document.getElementById('entryScreen').style.display = 'none';
}

// 原生锁已解除 → 隐藏状态条，回到入口
function onNativeUnlocked() {
  document.getElementById('lockStatus').classList.remove('active');
  document.getElementById('lockAIMsg').textContent = '';
  document.getElementById('entryScreen').style.display = '';
}

// 锁屏上显示 AI 的回复
function onAIMessage(msg) {
  const el = document.getElementById('lockAIMsg');
  if (el) el.textContent = msg;
}

// 用户点击"开始专注"
function requestFocus() {
  // 通过 parent 调用 chat.js 的锁机发起函数
  if (window.parent && typeof window.parent.requestAIFocus === 'function') {
    window.parent.requestAIFocus();
  } else {
    // fallback: 直接打开聊天页（让用户手动发消息触发 AI）
    showToast('正在跳转聊天页...');
    window.parent.openSubPage('chat.html');
  }
}

function showHistory() {
  showToast('专注记录功能即将上线');
}

// ── 监听原生桥接事件 ──
// FocusLockManager 解锁时调用此全局函数（由 chat.js 注入）
window.onFocusLockActive = onNativeLocked;
window.onFocusLockInactive = onNativeUnlocked;
window.updateFocusLockAIMessage = onAIMessage;
</script>
</body>
</html>
