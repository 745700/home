name: TestComplex

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - run: |
          echo "JDK done"
          java -version 2>&1 | head -1

      - name: Download something
        run: |
          echo "Downloading..."
          sleep 2
          echo "Done"
