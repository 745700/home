name: Test Railway

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Railway API
        run: |
          echo "Testing Railway API..."
          echo "Token: ${#RAILWAY_TOKEN} chars"
          curl -s --max-time 10 -w "\nHTTP: %{http_code}" -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { id email } }"}' \
            "https://backboard.railway.app/graphql/v1" 2>&1
