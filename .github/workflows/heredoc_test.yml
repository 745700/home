name: Heredoc Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          curl -s --max-time 120 -L \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -o cmdline-tools.zip
          unzip -q cmdline-tools.zip && mv cmdline-tools latest
          echo "ANDROID_HOME=$PWD/.." >> $GITHUB_ENV
          export ANDROID_HOME=$PWD/..
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -2
          echo "SDK ready"

      - name: Write Java file
        run: |
          cat > /tmp/Test.java << 'JAVACODE'
package com.aion.chat;
import android.app.Activity;
import android.os.Bundle;
import android.widget.TextView;
public class Test extends Activity {
    @Override protected void onCreate(Bundle b) {
        super.onCreate(b);
        TextView tv = new TextView(this);
        tv.setText("Hello");
        setContentView(tv);
    }
}
JAVACODE
          echo "Java file written"
          head -3 /tmp/Test.java

      - name: Download Python
        run: |
          curl -s --max-time 60 -L \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/python/python_3.13.13-1_aarch64.deb" \
            -o /tmp/python.deb
          ls -lh /tmp/python.deb
          dpkg-deb -x /tmp/python.deb /tmp/python_extracted/

      - name: Install packages
        run: |
          pip3 install --no-cache-dir --prefix=/tmp/pyprefix \
            fastapi uvicorn httpx aiosqlite pydantic pillow aiofiles \
            websockets python-multipart jinja2 fsspec jiter 2>&1 | tail -2

      - name: Download backend
        run: |
          rm -rf /tmp/aion && mkdir /tmp/aion
          git clone --depth=1 https://github.com/745700/home.git /tmp/aion 2>&1 | tail -2
