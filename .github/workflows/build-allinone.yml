      - name: Build debug APK
        env:
          ANDROID_HOME: /tmp/apk_project/android-sdk
        run: |
          export ANDROID_HOME=/tmp/apk_project/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Get Gradle
          cd /tmp/apk_project
          if [ ! -f /tmp/gradle-8.4.zip ]; then
            curl -s --max-time 120 -L \
              "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
              -o /tmp/gradle-8.4.zip
          fi
          unzip -q -o /tmp/gradle-4.4.zip -d /tmp/
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 2>&1 | tail -3
          
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -30

      - name: Upload APK
        if: success()
        run: |
          ls -lh /tmp/apk_project/app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir not found"
          find /tmp/apk_project -name "*.apk" 2>/dev/null | head -5

      - name: Upload to GitHub release
        if: success()
        run: |
          APK=$(find /tmp/apk_project -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK found: $APK"
            ls -lh "$APK"
          else
            echo "No APK found"
          fi

