name: Build All-in-one APK

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-allinone]
    inputs:
      pypi_packages:
        description: 'Extra pip packages (comma separated)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          curl -s --max-time 120 -L \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -o cmdline-tools.zip
          unzip -q cmdline-tools.zip && mv cmdline-tools latest
          echo "ANDROID_HOME=$PWD/.." >> $GITHUB_ENV
          export ANDROID_HOME=$PWD/..
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -2

      - name: Download Termux Python
        run: |
          curl -s --max-time 60 -L \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/python/python_3.13.13-1_aarch64.deb" \
            -o /tmp/python.deb
          ls -lh /tmp/python.deb
          dpkg-deb -x /tmp/python.deb /tmp/python_extracted/
          # Termux deb uses Android data dir: data/data/com.termux/files/usr/
          PYTHON_BASE=/tmp/python_extracted/data/data/com.termux/files/usr
          find $PYTHON_BASE/ -name "python3*" | head -5
          ls $PYTHON_BASE/bin/ | grep -E "python|pip" | head -10

      - name: Install Python packages
        run: |
          pip3 install \
            fastapi uvicorn httpx aiosqlite pydantic pillow aiofiles \
            websockets python-multipart jinja2 fsspec jiter \
            2>&1 | tail -3
          echo "=== Pack to tar.gz ==="
          pip3 freeze | grep -v "##" > /tmp/requirements.txt
          pip3 install --target /tmp/site-packages jiter 2>&1 | tail -2

      - name: Download Aion backend code
        run: |
          cd /tmp
          rm -rf aion-chat && mkdir aion-chat
          git clone --depth=1 --filter=blob:none \
            https://github.com/745700/home.git aion-chat-src 2>&1 | tail -2
          cd aion-chat-src
          git sparse-checkout set aion-chat 2>/dev/null || true
          ls aion-chat/ | head -5 || ls | head -5

      - name: Prepare APK project
        run: |
          mkdir -p /tmp/apk_project/app/src/main/assets
          mkdir -p /tmp/apk_project/app/src/main/java/com/aion/chat
          mkdir -p /tmp/apk_project/app/src/main/res/values
          mkdir -p /tmp/apk_project/app/src/main/res/layout
          mkdir -p /tmp/apk_project/app/src/main/res/drawable
          mkdir -p /tmp/apk_project/gradle/wrapper
          
          # Termux deb path
          PYTHON_BASE=/tmp/python_extracted/data/data/com.termux/files/usr
          # Copy Python binary
          cp $PYTHON_BASE/bin/python3.13 /tmp/apk_project/app/src/main/assets/python
          # Copy libpython
          find $PYTHON_BASE/ -name "libpython3.13*" -exec cp {} /tmp/apk_project/app/src/main/assets/python/ \; 2>/dev/null || true
          # Copy site-packages
          mkdir -p /tmp/apk_project/app/src/main/assets/python/lib/python3.13
          cp -r /tmp/site-packages/* /tmp/apk_project/app/src/main/assets/python/lib/python3.13/ 2>/dev/null || true
          
          ls /tmp/apk_project/app/src/main/assets/python/ | head -10
          ls /tmp/apk_project/app/src/main/assets/python/lib/python3.13/ | head -5

      - name: Copy Aion backend
        run: |
          # Copy aion-chat source
          cp -r /tmp/aion-chat-src/aion-chat /tmp/apk_project/app/src/main/assets/
          ls /tmp/apk_project/app/src/main/assets/aion-chat/ | head -5

      - name: Create Java launcher
        run: |
          cat > /tmp/apk_project/app/src/main/java/com/aion/chat/PythonLauncher.java << 'JAVA'
package com.aion.chat;

import android.app.Activity;
import android.os.Bundle;
import android.widget.TextView;
import android.widget.ScrollView;
import android.widget.LinearLayout;
import java.io.*;
import java.nio.file.*;

public class PythonLauncher extends Activity {
    private static final int PORT = 8080;
    private Process pythonProcess;
    
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        
        LinearLayout layout = new LinearLayout(this);
        layout.setOrientation(LinearLayout.VERTICAL);
        layout.setPadding(16, 16, 16, 16);
        
        TextView log = new TextView(this);
        log.setTextSize(12);
        ScrollView scroll = new ScrollView(this);
        scroll.addView(log);
        layout.addView(scroll);
        setContentView(layout);
        
        append(log, "Aion Backend starting...");
        
        // Extract Python from assets if needed
        File pythonDir = new File(getFilesDir(), "python");
        File pythonBin = new File(pythonDir, "python3.13");
        
        if (!pythonBin.exists()) {
            append(log, "Extracting Python...");
            pythonDir.mkdirs();
            copyAssetFolder(getAssets(), "python", pythonDir);
            pythonBin.setExecutable(true, false);
            append(log, "Python extracted to: " + pythonBin.getAbsolutePath());
        }
        
        append(log, "Python binary: " + pythonBin.exists() + " (" + pythonBin.length() + " bytes)");
        
        // Extract aion-chat from assets
        File aionDir = new File(getFilesDir(), "aion-chat");
        if (!aionDir.exists() || aionDir.list().length < 5) {
            append(log, "Extracting aion-chat...");
            aionDir.mkdirs();
            copyAssetFolder(getAssets(), "aion-chat", aionDir);
        }
        append(log, "Aion dir: " + aionDir.getAbsolutePath());
        
        // Set PYTHONPATH
        File sitePackages = new File(pythonDir, "lib/python3.13/site-packages");
        String pythonPath = pythonDir.getAbsolutePath() + ":" + sitePackages.getAbsolutePath();
        append(log, "PYTHONPATH: " + pythonPath);
        
        // Start Python backend
        append(log, "Starting backend on port " + PORT + "...");
        
        try {
            String mainPy = new File(aionDir, "main.py").getAbsolutePath();
            
            ProcessBuilder pb = new ProcessBuilder(
                pythonBin.getAbsolutePath(),
                "-m", "uvicorn",
                "main:app",
                "--host", "127.0.0.1",
                "--port", String.valueOf(PORT)
            );
            pb.environment().put("PYTHONPATH", pythonPath);
            pb.environment().put("PYTHONHOME", pythonDir.getAbsolutePath());
            pb.environment().put("TERM", "xterm");
            pb.directory(aionDir);
            pb.redirectErrorStream(true);
            
            pythonProcess = pb.start();
            
            // Read output
            BufferedReader br = new BufferedReader(new InputStreamReader(pythonProcess.getInputStream()));
            String line;
            int count = 0;
            while ((line = br.readLine()) != null && count < 20) {
                append(log, "[py] " + line);
                count++;
            }
            
            append(log, "Backend process started, pid=" + pythonProcess.hashCode());
            append(log, "Waiting for server to start...");
            
            Thread.sleep(3000);
            
            if (pythonProcess.isAlive()) {
                append(log, "SUCCESS: Backend running!");
                append(log, "Open http://127.0.0.1:" + PORT + "/chat in WebView");
            } else {
                append(log, "ERROR: Process died, exit=" + pythonProcess.exitValue());
            }
            
        } catch (Exception e) {
            append(log, "ERROR: " + e.getClass().getName() + ": " + e.getMessage());
            e.printStackTrace();
        }
    }
    
    private void append(TextView tv, String msg) {
        final String m = msg;
        runOnUiThread(() -> tv.append(m + "\n"));
    }
    
    private void copyAssetFolder(android.content.res.AssetManager am, String src, File dst) {
        try {
            String[] files = am.list(src);
            if (files == null || files.length == 0) {
                // It's a file
                copyAssetFile(am, src, new File(dst, new java.io.File(src).getName()));
            } else {
                // It's a directory
                dst.mkdirs();
                for (String f : files) {
                    copyAssetFolder(am, src + "/" + f, dst);
                }
            }
        } catch (IOException e) {}
    }
    
    private void copyAssetFile(android.content.res.AssetManager am, String src, File dst) {
        try {
            InputStream is = am.open(src);
            Files.copy(is, dst.toPath());
            is.close();
        } catch (IOException e) {}
    }
    
    @Override
    protected void onDestroy() {
        super.onDestroy();
        if (pythonProcess != null && pythonProcess.isAlive()) {
            pythonProcess.destroy();
        }
    }
}
JAVA
          echo "Java launcher created"

      - name: Create WebView activity
        run: |
          cat > /tmp/apk_project/app/src/main/java/com/aion/chat/WebViewActivity.java << 'JAVA'
package com.aion.chat;

import android.os.Bundle;
import android.webkit.*;
import android.widget.Toast;

public class WebViewActivity extends Activity {
    @Override protected void onCreate(Bundle b) {
        super.onCreate(b);
        WebView wv = new WebView(this);
        setContentView(wv);
        
        String url = getIntent().getStringExtra("url");
        if (url == null) url = "http://127.0.0.1:8080/chat";
        
        wv.loadUrl(url);
        
        WebSettings ws = wv.getSettings();
        ws.setJavaScriptEnabled(true);
        ws.setDomStorageEnabled(true);
        ws.setMediaPlaybackRequiresUserGesture(false);
        ws.setAllowFileAccess(true);
        ws.setAllowContentAccess(true);
        
        wv.setWebViewClient(new WebViewClient() {
            @Override
            public void onPageStarted(WebView view, String url, android.graphics.Bitmap favicon) {
                super.onPageStarted(view, url, favicon);
            }
            
            @Override
            public void onReceivedError(WebView v, int err, String desc) {
                Toast.makeText(WebViewActivity.this, "Error: " + desc, Toast.LENGTH_SHORT).show();
            }
        });
        
        Toast.makeText(this, "Connecting to: " + url, Toast.LENGTH_SHORT).show();
    }
}
JAVA

      - name: Create AndroidManifest
        run: |
          cat > /tmp/apk_project/app/src/main/AndroidManifest.xml << 'XML'
