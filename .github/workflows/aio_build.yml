name: Build All-in-one APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          curl -s --max-time 120 -L https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip && mv cmdline-tools latest
          echo "ANDROID_HOME=$PWD/.." >> $GITHUB_ENV
          export ANDROID_HOME=$PWD/..
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -2
          echo "SDK done"

      - name: Setup Android NDK
        run: |
          cd android-sdk
          curl -s --max-time 300 -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26b" >> $GITHUB_ENV
          echo "NDK done"

      - name: Download Python source
        run: |
          curl -s --max-time 120 -L https://www.python.org/ftp/python/3.13.0/Python-3.13.0.tgz -o /tmp/Python-3.13.0.tgz
          ls -lh /tmp/Python-3.13.0.tgz

      - name: Configure Python
        run: |
          export ANDROID_NDK=$ANDROID_NDK_HOME
          export PATH=$PATH:$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          cd /tmp
          tar -xf Python-3.13.0.tgz
          cd Python-3.13.0
          ./configure --build=x86_64-pc-linux-gnu --host=aarch64-linux-android --with-build-python=/usr/bin/python3 --prefix=/tmp/pyinstall --disable-ipv6 --without-ensurepip --disable-test-modules 2>&1 | tail -3
          echo "Configured"

      - name: Compile Python
        run: |
          cd /tmp/Python-3.13.0
          make -j$(nproc) 2>&1 | tail -5
          make install 2>&1 | tail -3
          ls /tmp/pyinstall/bin/
          echo "Python built"

      - name: Install pip packages
        run: |
          /tmp/pyinstall/bin/python3 -m pip install --no-cache-dir --prefix=/tmp/pyenv fastapi uvicorn httpx aiosqlite pydantic pillow aiofiles websockets python-multipart jinja2 2>&1 | tail -5
          echo "Packages installed"

      - name: Download Aion backend
        run: |
          rm -rf /tmp/aion-src
          git clone --depth=1 https://github.com/745700/home.git /tmp/aion-src 2>&1 | tail -2

      - name: Prepare APK project
        run: |
          mkdir -p /tmp/apk/app/src/main/assets/python/lib/python3.13/site-packages
          mkdir -p /tmp/apk/app/src/main/assets/aion-chat
          cp /tmp/pyinstall/bin/python3.13 /tmp/apk/app/src/main/assets/python/
          cp -r /tmp/pyinstall/lib/python3.13/* /tmp/apk/app/src/main/assets/python/lib/python3.13/
          cp -r /tmp/pyenv/lib/python3.13/site-packages/* /tmp/apk/app/src/main/assets/python/lib/python3.13/site-packages/ 2>/dev/null || true
          cp -r /tmp/aion-src/aion-chat/* /tmp/apk/app/src/main/assets/aion-chat/
          cp -r /tmp/aion-src/AionApp/app/src/main/java /tmp/apk/app/src/main/
          cp -r /tmp/aion-src/AionApp/app/src/main/res /tmp/apk/app/src/main/
          cp /tmp/aion-src/AionApp/build.gradle /tmp/apk/
          cp /tmp/aion-src/AionApp/gradle.properties /tmp/apk/
          cp /tmp/aion-src/AionApp/settings.gradle /tmp/apk/
          mkdir -p /tmp/apk/gradle/wrapper
          echo "APK project prepared"

      - name: Setup Gradle
        run: |
          curl -s --max-time 180 https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -q -o /tmp/gradle.zip -d /tmp/
          cd /tmp/apk
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 2>&1 | tail -2
          echo "Gradle ready"

      - name: Build APK
        env:
          ANDROID_HOME: /tmp/android-sdk
          ANDROID_NDK_HOME: $ANDROID_NDK_HOME
        run: |
          export ANDROID_HOME=/tmp/android-sdk
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          cd /tmp/apk
          /tmp/gradle-8.4/bin/gradle assembleDebug --no-daemon 2>&1 | tail -40

      - name: Upload APK to Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=/tmp/apk/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "APK: $(du -sh $APK | cut -f1)"
            gh release view v2.0.0-allinone --repo 745700/home 2>/dev/null &&               gh release upload v2.0.0-allinone "$APK" --repo 745700/home --clobber ||               gh release create v2.0.0-allinone --repo 745700/home                 --title "Aion Home All-in-one APK"                 --notes "Built with Python 3.13 from source + Android NDK" "$APK"
          else
            find /tmp/apk -name "*.apk" 2>/dev/null || echo "NO APK FOUND"
          fi
