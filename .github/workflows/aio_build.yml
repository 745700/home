name: Build All-in-one APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          curl -s --max-time 120 -L https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip && mv cmdline-tools latest
          yes | ./latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          ./latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -2
          echo "SDK done"

      - name: Setup Android NDK
        run: |
          cd android-sdk
          curl -s --max-time 300 -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          echo "NDK done"

      - name: Download Python source
        run: |
          curl -s --max-time 120 -L https://www.python.org/ftp/python/3.13.0/Python-3.13.0.tgz -o /tmp/Python-3.13.0.tgz
          ls -lh /tmp/Python-3.13.0.tgz

      - name: Configure native Python (for host tools)
        run: |
          cd /tmp
          tar -xf Python-3.13.0.tgz
          cd Python-3.13.0
          ./configure --prefix=/tmp/pybuild --disable-ipv6 --without-ensurepip --disable-test-modules 2>&1 | tail -3
          echo "Native configured"

      - name: Build native Python (for host tools)
        run: |
          cd /tmp/Python-3.13.0
          make -j$(nproc) 2>&1 | tail -3
          make install 2>&1 | tail -2
          echo "Native Python built"

      - name: Configure cross-compile Python
        run: |
          export ANDROID_NDK=$GITHUB_WORKSPACE/android-sdk/android-ndk-r26b
          export PATH=$PATH:$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          cd /tmp/Python-3.13.0
          make clean
          ./configure --build=x86_64-pc-linux-gnu --host=aarch64-linux-android --with-build-python=/tmp/pybuild/bin/python3 --prefix=/tmp/pyinstall --disable-ipv6 --without-ensurepip --disable-test-modules
          echo "Cross-configured"

      - name: Cross-compile Python
        run: |
          export ANDROID_NDK=$GITHUB_WORKSPACE/android-sdk/android-ndk-r26b
          cd /tmp/Python-3.13.0
          make -j$(nproc)
          make install
          ls /tmp/pyinstall/bin/
          file /tmp/pyinstall/bin/python3.13
          echo "Python built"

      - name: Install pip packages
        run: |
          python3 -m pip install --no-cache-dir --only-binary=:all: --target=/tmp/pyinstall/lib/python3.13/site-packages fastapi uvicorn httpx aiosqlite pydantic aiofiles websockets python-multipart jinja2
          echo "Packages installed"

      - name: Download Aion backend
        run: |
          rm -rf /tmp/aion-src
          git clone --depth=1 https://github.com/745700/home.git /tmp/aion-src
          ls /tmp/aion-src/

      - name: Prepare APK project
        run: |
          set -e
          # Copy entire AionApp Android project to /tmp/apk/
          cp -r /tmp/aion-src/AionApp /tmp/apk
          # The AionApp/build.gradle has com.android.application but settings.gradle
          # is missing "include ':app'" -- add it now so app/ is a proper module
          if ! grep -q "include ':app'" /tmp/apk/settings.gradle; then
            echo "include ':app'" >> /tmp/apk/settings.gradle
          fi
          # Verify structure
          echo "=== /tmp/apk/ contents ==="
          ls /tmp/apk/
          echo "=== settings.gradle ==="
          cat /tmp/apk/settings.gradle
          echo "=== /tmp/apk/app/ contents ==="
          ls /tmp/apk/app/
          echo "=== /tmp/apk/app/src/main/ ==="
          ls /tmp/apk/app/src/main/
          # Copy Python assets into Android assets dir
          mkdir -p /tmp/apk/app/src/main/assets/python/lib/python3.13/site-packages
          cp /tmp/pyinstall/bin/python3.13 /tmp/apk/app/src/main/assets/python/
          cp -r /tmp/pyinstall/lib/python3.13/* /tmp/apk/app/src/main/assets/python/lib/python3.13/
          cp -r /tmp/pyinstall/lib/python3.13/site-packages/* /tmp/apk/app/src/main/assets/python/lib/python3.13/site-packages/ || true
          # Copy aion-chat web frontend
          mkdir -p /tmp/apk/app/src/main/assets/aion-chat
          cp -r /tmp/aion-src/aion-chat/* /tmp/apk/app/src/main/assets/aion-chat/
          # Fix AndroidManifest.xml for AGP 8.x + Android 12+
          sed -i '/package="com.aion.chat"/d' /tmp/apk/app/src/main/AndroidManifest.xml
          sed -i 's|<activity android:name=".PythonLauncher">|<activity android:name=".PythonLauncher" android:exported="true">|' /tmp/apk/app/src/main/AndroidManifest.xml
          echo "=== Fixed AndroidManifest.xml ==="
          cat /tmp/apk/app/src/main/AndroidManifest.xml
          echo "APK project prepared"

      - name: Setup Gradle
        run: |
          curl -sL --max-time 300 --retry 3 --retry-delay 10 https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          ls -lh /tmp/gradle.zip
          unzip -q -o /tmp/gradle.zip -d /tmp/
          echo "Gradle ready"

      - name: Build APK
        env:
          ANDROID_HOME: $GITHUB_WORKSPACE/android-sdk
          ANDROID_SDK_ROOT: ""
        run: |
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME=$GITHUB_WORKSPACE/android-sdk
          cd /tmp/apk
          /tmp/gradle-8.4/bin/gradle clean assembleDebug --no-daemon

      - name: Upload APK to Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=/tmp/apk/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "APK: $(du -sh $APK | cut -f1)"
            gh release view v2.0.0-allinone --repo 745700/home 2>/dev/null &&               gh release upload v2.0.0-allinone "$APK" --repo 745700/home --clobber ||               gh release create v2.0.0-allinone --repo 745700/home                 --title "Aion Home All-in-one APK"                 --notes "Built with Python 3.13 from source + Android NDK" "$APK"
          else
            find /tmp/apk -name "*.apk" 2>/dev/null || echo "NO APK FOUND"
          fi
