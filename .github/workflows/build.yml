name: Build AionApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Existing release ID to upload to (optional)'
        required: false
        type: string

concurrency:
  group: build-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: brew install --cask android-sdk || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > AionApp/local.properties

      - name: Build debug APK
        run: |
          cd AionApp
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -5
        env:
          TERM: dumb

      - name: List APK files
        run: |
          echo "=== find result ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== ls result ==="
          ls -lh AionApp/app/build/outputs/apk/debug/ 2>/dev/null || echo "dir not found"
          echo "=== android build output ==="
          ls -lh AionApp/app/build/outputs/ 2>/dev/null || echo "outputs dir not found"

      - name: Create Release
        id: create_release
        if: inputs.release_id == ''
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}-offline
          release_name: Offline APK v${{ github.run_number }}
          body: "离线版 APK v${{ github.run_number }}"
          draft: true
          prerelease: false

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.release_id }}" ]; then
            # Upload to existing release
            RELEASE_JSON=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/${{ inputs.release_id }}")
            UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['upload_url'].replace('{?name,label}',''))")
            echo "Uploading to existing release ID ${{ inputs.release_id }}"
            echo "Upload URL: $UPLOAD_URL"
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              -T AionApp/app/build/outputs/apk/debug/app-debug.apk \
              "$UPLOAD_URL?name=app-debug.apk"
            echo "Done"
          else
            # Upload via workflow output
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              -T AionApp/app/build/outputs/apk/debug/app-debug.apk \
              "${{ steps.create_release.outputs.upload_url }}?name=app-debug.apk"
          fi
