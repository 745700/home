name: Build AionApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Existing release ID to upload to (optional)'
        required: false
        type: string

concurrency:
  group: build-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: brew install --cask android-sdk || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > AionApp/local.properties

      - name: Build debug APK
        run: |
          cd AionApp
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --rerun-tasks 2>&1 | tail -10
        env:
          TERM: dumb

      - name: List APK files
        run: |
          echo "=== find result ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== ls result ==="
          ls -lh AionApp/app/build/outputs/apk/debug/ 2>/dev/null || echo "dir not found"
          echo "=== android build output ==="
          ls -lh AionApp/app/build/outputs/ 2>/dev/null || echo "outputs dir not found"

      - name: Create Release
        id: create_release
        if: inputs.release_id == ''
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}-offline
          release_name: Offline APK v${{ github.run_number }}
          body: "离线版 APK v${{ github.run_number }}"
          draft: true
          prerelease: false

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-offline
          name: Offline APK v${{ github.run_number }}
          body: "离线版 APK v${{ github.run_number }}"
          draft: false
          prerelease: false
          files: AionApp/app/build/outputs/apk/debug/app-debug.apk
