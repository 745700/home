name: Build AionApp APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/android-cmdline
          mkdir -p /opt/android-sdk/cmdline-tools
          mv /tmp/android-cmdline/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Create local.properties
        run: |
          echo "sdk.dir=/opt/android-sdk" > AionApp/local.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> AionApp/gradle.properties

      - name: Build debug APK
        id: build
        run: |
          cd AionApp
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=none 2>&1 | tee /tmp/build_output.txt
          echo "---APK_FILES---"
          find . -name "*.apk" -type f 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK_DIR_NOT_FOUND"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build_output.txt
          retention-days: 1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aion-app-debug
          path: AionApp/app/build/outputs/apk/debug/*.apk
          retention-days: 7
