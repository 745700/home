name: Build AionApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > AionApp/local.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> AionApp/gradle.properties

      - name: Build debug APK
        run: |
          cd AionApp
          ./gradlew assembleDebug \
            --no-daemon \
            --warning-mode=none 2>&1 | tail -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aion-app-debug
          path: AionApp/app/build/outputs/apk/debug/*.apk
          retention-days: 7
