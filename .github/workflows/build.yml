name: Build AionApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: brew install --cask android-sdk || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > AionApp/local.properties

      - name: Build debug APK
        run: |
          cd AionApp
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
        env:
          TERM: dumb

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: v1.0.2-offline
          name: Offline APK v1.0.2
          body: "离线版 APK v1.0.2 - 包含所有离线修复"
          artifacts: "AionApp/app/build/outputs/apk/debug/*.apk"
          artifactContentType: application/vnd.android.package-archive
          draft: true
          prerelease: false
          allowEmptyCommits: true
