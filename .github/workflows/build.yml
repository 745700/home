name: Build AionApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: brew install --cask android-sdk || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > AionApp/local.properties

      - name: Build debug APK
        run: |
          cd AionApp
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
        env:
          TERM: dumb

      - name: Create Release and Upload APK
        run: |
          set -e
          APK_PATH=$(find AionApp -name "*.apk" | head -1)
          echo "APK file: $APK_PATH"
          APK_SIZE=$(wc -c < "$APK_PATH")
          echo "APK size: $APK_SIZE bytes"

          # Delete existing release with same tag if exists
          EXISTING=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/v1.0.2-offline")
          if echo "$EXISTING" | grep -q '"id"'; then
            EXISTING_ID=$(echo "$EXISTING" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Deleting existing release ID: $EXISTING_ID"
            curl -s -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$EXISTING_ID"
          fi

          # Create new release
          echo "Creating release..."
          RELEASE_RESP=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/releases \
            -d '{"tag_name":"v1.0.2-offline","name":"Offline APK v1.0.2","body":"离线版 APK v1.0.2","draft":true,"prerelease":false}')
          echo "Release response: $RELEASE_RESP"
          RELEASE_ID=$(echo "$RELEASE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id','ERROR'))")
          echo "Release ID: $RELEASE_ID"

          # Upload asset
          echo "Uploading APK..."
          UPLOAD_URL="https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=app-debug.apk"
          echo "Upload URL: $UPLOAD_URL"
          UPLOAD_RESP=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "Content-Length: $APK_SIZE" \
            --data-binary "@$APK_PATH" \
            "$UPLOAD_URL")
          echo "Upload response: $UPLOAD_RESP"
          echo "DONE"
