name: Build All-in-one APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          curl -s --max-time 120 -L \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -o cmdline-tools.zip
          unzip -q cmdline-tools.zip && mv cmdline-tools latest
          echo "ANDROID_HOME=$PWD/.." >> $GITHUB_ENV
          export ANDROID_HOME=$PWD/..
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -2

      - name: Download and extract Termux Python
        run: |
          curl -s --max-time 60 -L \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/python/python_3.13.13-1_aarch64.deb" \
            -o /tmp/python.deb
          ls -lh /tmp/python.deb
          dpkg-deb -x /tmp/python.deb /tmp/python_extracted/
          # Termux deb uses Android data dir
          PYTHON_BASE=/tmp/python_extracted/data/data/com.termux/files/usr
          ls $PYTHON_BASE/bin/python3.13
          ls $PYTHON_BASE/lib/libpython3.13.so

      - name: Install Python packages
        run: |
          pip3 install --target /tmp/site-packages \
            fastapi uvicorn httpx aiosqlite pydantic pillow aiofiles \
            websockets python-multipart jinja2 fsspec jiter 2>&1 | tail -5

      - name: Download aion-chat source
        run: |
          cd /tmp
          git clone --depth=1 --filter=blob:none \
            https://github.com/745700/home.git aion-src 2>&1 | tail -2
          cd aion-src
          git sparse-checkout set aion-chat 2>/dev/null || true

      - name: Prepare all-in-one assets
        run: |
          mkdir -p AionApp/app/src/main/assets/python
          mkdir -p AionApp/app/src/main/assets/aion-chat
          
          PYTHON_BASE=/tmp/python_extracted/data/data/com.termux/files/usr
          
          # Copy Python binary and libs
          cp $PYTHON_BASE/bin/python3.13 AionApp/app/src/main/assets/python/
          cp $PYTHON_BASE/lib/libpython3.13.so AionApp/app/src/main/assets/python/
          cp $PYTHON_BASE/lib/libpython3.13.so.1.0 AionApp/app/src/main/assets/python/ 2>/dev/null || true
          
          # Copy standard library
          mkdir -p AionApp/app/src/main/assets/python/lib/python3.13
          cp -r $PYTHON_BASE/lib/python3.13/* AionApp/app/src/main/assets/python/lib/python3.13/
          
          # Copy site-packages
          cp -r /tmp/site-packages/* AionApp/app/src/main/assets/python/lib/python3.13/site-packages/ 2>/dev/null || true
          
          # Copy aion-chat backend
          cp -r /tmp/aion-src/aion-chat/* AionApp/app/src/main/assets/aion-chat/
          
          echo "=== Python assets ==="
          ls AionApp/app/src/main/assets/python/
          echo "Size: $(du -sh AionApp/app/src/main/assets/python/ | cut -f1)"
          echo "=== Aion assets ==="
          ls AionApp/app/src/main/assets/aion-chat/ | head -5
          echo "Size: $(du -sh AionApp/app/src/main/assets/aion-chat/ | cut -f1)"

      - name: Create local.properties
        run: |
          echo "sdk.dir=/home/runner/work/_actions/$(echo $GITHUB_ACTION_PATH | cut -d'/' -f1-4)/android-sdk" > AionApp/local.properties

      - name: Configure network security
        run: |
          cat > AionApp/app/src/main/res/xml/network_security_config.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true"/>
    <domain-config cleartextTrafficPermitted="true">
        <domain includeSubdomains="true">127.0.0.1</domain>
        <domain includeSubdomains="true">10.0.2.2</domain>
        <domain includeSubdomains="true">localhost</domain>
    </domain-config>
</network-security-config>
XML

      - name: Build debug APK
        run: |
          cd AionApp
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20

      - name: Find APK
        id: apk
        run: |
          APK=$(find AionApp -name "*.apk" 2>/dev/null | head -1)
          echo "path=$APK"
          if [ -n "$APK" ]; then
            ls -lh "$APK"
            echo "size=$(stat -c%s "$APK" 2>/dev/null || echo 0)"
          else
            echo "No APK found!"
            find AionApp -name "*.apk" 2>/dev/null
          fi

      - name: Upload to Release v2.0.0-allinone
        if: success() && steps.apk.outputs.path != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="${{ steps.apk.outputs.path }}"
          APK_NAME="app-debug-allinone.apk"
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/745700/home/releases/tags/v2.0.0-allinone" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo "0")
          echo "Release ID: $RELEASE_ID"
          if [ "$RELEASE_ID" != "0" ]; then
            curl -s --max-time 300 -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$APK_PATH" \
              "https://uploads.github.com/repos/745700/home/releases/$RELEASE_ID/assets?name=$APK_NAME" | \
              python3 -c "import sys,json; r=json.load(sys.stdin); print('Uploaded:', r.get('browser_download_url','N/A'))"
          fi
