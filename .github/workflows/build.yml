name: Build AionApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: echo "Checkout OK"
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - run: java -version && echo "JAVA OK"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: echo "ANDROID_HOME=$ANDROID_HOME"
      - name: Build debug APK
        run: |
          cd AionApp
          ./gradlew assembleDebug --no-daemon --warning-mode=none 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aion-app-debug
          path: AionApp/app/build/outputs/apk/debug/*.apk
          retention-days: 7
