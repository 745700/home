name: Build AionApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: |
          brew install --cask android-sdk || true
          echo "sdk.dir=$ANDROID_HOME" > AionApp/local.properties

      - name: Build debug APK
        run: |
          cd AionApp
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aion-app-debug
          path: AionApp/app/build/outputs/apk/debug/*.apk
          retention-days: 7
