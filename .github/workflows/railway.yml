name: Deploy to Railway

on:
  workflow_dispatch:
    inputs:
      railway_token:
        description: 'Railway Token'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli 2>&1 | tail -2
          railway --version

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ inputs.railway_token }}
        run: |
          railway whoami 2>&1
          railway init --name aionshome --json 2>&1
          railway up ./aion-chat --detach --json -y 2>&1
          sleep 30
          railway domain 2>&1
