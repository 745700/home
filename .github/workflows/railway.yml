name: Deploy to Railway v10

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI v4
        run: |
          npm install -g @railway/cli@4 2>&1 | tail -2
          railway --version

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set +e
          echo "=== whoami ==="
          railway whoami 2>&1
          echo "EXIT whoami: $?"
          echo "=== login ==="
          railway login --token "$RAILWAY_TOKEN" 2>&1
          echo "EXIT login: $?"
          echo "=== whoami2 ==="
          railway whoami 2>&1
          echo "EXIT whoami2: $?"
