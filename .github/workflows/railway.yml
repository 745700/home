name: Deploy to Railway v6

on:
  workflow_dispatch:
    inputs:
      railway_token:
        description: 'Railway Token'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli 2>&1 | tail -2
          railway --version
          railway help 2>&1 | head -20
          railway init --help 2>&1
          railway up --help 2>&1

      - name: Deploy
        if: success()
        env:
          RAILWAY_TOKEN: ${{ inputs.railway_token }}
        run: |
          railway whoami 2>&1
          railway init 2>&1
          railway up --dir aion-chat 2>&1
          railway domain 2>&1
