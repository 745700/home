name: Deploy to Railway v9

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli 2>&1 | tail -2
          railway --version

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set +e
          # Try login with token
          railway login --token "$RAILWAY_TOKEN" 2>&1
          railway whoami 2>&1
