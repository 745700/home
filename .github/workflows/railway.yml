name: Deploy to Railway

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Railway CLI
        run: |
          set -x
          npm install -g @railway/cli 2>&1 | tail -3
          railway --version 2>&1

      - name: Deploy
        if: success()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -x
          echo "Token: ${#RAILWAY_TOKEN} chars"
          railway login --token "$RAILWAY_TOKEN" 2>&1
          railway init --no-input 2>&1
          railway up --dir aion-chat 2>&1
          railway domain 2>&1
