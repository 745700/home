name: Download Python Deb

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Download and verify Termux Python
        run: |
          URL="https://packages.termux.dev/apt/termux-main/pool/main/p/python/python_3.13.13-1_aarch64.deb"
          echo "Downloading: $URL"
          curl -s --max-time 60 -L "$URL" -o /tmp/python.deb
          ls -lh /tmp/python.deb
          file /tmp/python.deb
          # Check valid deb
          if file /tmp/python.deb | grep -q "Debian binary"; then
            echo "=== VALID DEB ==="
            ar t /tmp/python.deb | head -10
            echo "=== Extract control info ==="
            ar -p /tmp/python.deb control.tar.gz 2>/dev/null | tar -tzf - | head -10
          else
            cat /tmp/python.deb | head -5
          fi

          echo "=== Also download python_3.13.13 aarch64 dev package ==="
          DEVURL="https://packages.termux.dev/apt/termux-main/pool/main/p/python/python-dev_3.13.13-1_aarch64.deb"
          curl -s --max-time 30 -L "$DEVURL" -o /tmp/python-dev.deb
          ls -lh /tmp/python-dev.deb
          file /tmp/python-dev.deb

          echo "=== Download libpython ==="
          LIBURL="https://packages.termux.dev/apt/termux-main/pool/main/p/python/libpython3.13_3.13.13-1_aarch64.deb"
          curl -s --max-time 30 -L "$LIBURL" -o /tmp/libpython.deb
          ls -lh /tmp/libpython.deb
          file /tmp/libpython.deb
