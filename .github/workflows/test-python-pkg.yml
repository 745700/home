name: Test Package Downloads

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Find Termux package URLs
        run: |
          echo "=== Test: Termux package mirror ==="
          # Try different Termux package mirrors
          curl -s --max-time 10 "https://github.com/termux/termux-packages/releases" 2>&1 | grep -o 'href="[^"]*aarch64[^"]*"' | head -5
          echo "---"
          # Try direct package URL pattern
          curl -s --max-time 10 -I "https://github.com/termux/termux-packages/releases/download/v1.0.0/python-3.11.8-aarch64.deb" 2>&1 | grep -E "HTTP|Location|Content-Length"

          echo "=== Test 2: BeeWare ==="
          pip3 install briefcase 2>&1 | tail -3
          python3 -m briefcase --version 2>&1

          echo "=== Test 3: Python-for-Android ==="
          pip3 install python-for-android 2>&1 | tail -3

          echo "=== Test 4: android-python3x ==="
          pip3 install android-python3x 2>&1 | tail -3

          echo "=== Test 5: Termux Bootstrap Tarball ==="
          curl -s --max-time 30 -I "https://raw.githubusercontent.com/termux/termux.github.io/main/packages/bootstrap/termux-bootstrap-aarch64.tar.zst" 2>&1 | grep HTTP
          curl -s --max-time 30 -L "https://github.com/termux/termux-app/releases/download/v0.118.0/termux-ap_0.118.0_aarch64.deb" -o /tmp/termux.deb 2>&1
          ls -lh /tmp/termux.deb 2>/dev/null || echo "No deb"
