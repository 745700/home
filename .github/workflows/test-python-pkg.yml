name: Find Python URL

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Termux Packages
        run: |
          curl -s --max-time 30 \
            "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages.gz" \
            -o /tmp/Packages.gz
          gunzip -f /tmp/Packages.gz
          # Find python3 entry - show the Architecture and Filename fields
          awk '/^Package: python3$/,/^$/ {print}' /tmp/Packages | grep -E "^Package|^Filename|^Version|^Architecture" | head -10
          echo "---"
          # Also check python (the meta-package)
          awk '/^Package: python$/,/^$/ {print}' /tmp/Packages | grep -E "^Package|^Filename|^Version|^Architecture" | head -10

          echo "=== Download python3 ==="
          FILENAME=$(awk '/^Package: python3$/,/^$/ {if(/^Filename:/) print $2}' /tmp/Packages)
          echo "Filename: $FILENAME"
          if [ -n "$FILENAME" ]; then
            curl -s --max-time 60 -L \
              "https://packages.termux.dev/apt/termux-main/$FILENAME" \
              -o /tmp/python3.deb
            ls -lh /tmp/python3.deb
            file /tmp/python3.deb 2>/dev/null
            # Check if it's a valid deb
            if file /tmp/python3.deb | grep -q "Debian binary"; then
              echo "VALID DEB!"
              ar t /tmp/python3.deb | head -5
            fi
          fi
