name: Test Python Package Download

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Termux package download
        run: |
          echo "=== Test 1: Termux deb from GitHub ==="
          curl -s --max-time 30 -L \
            "https://github.com/termux/termux-packages/releases/download/bootstrap-2024-01-29/python-3.11.8-aarch64.deb" \
            -o /tmp/python.deb 2>&1
          ls -lh /tmp/python.deb 2>/dev/null || echo "FAILED"

          echo "=== Test 2: Check if python3 is available ==="
          which python3 && python3 --version || echo "No python3"

          echo "=== Test 3: Try pip install some packages ==="
          pip3 install fastapi uvicorn httpx aiosqlite pydantic pillow numpy 2>&1 | tail -5

          echo "=== Test 4: Download Termux bootstrap ==="
          curl -s --max-time 60 -L \
            "https://github.com/termux/termux.github.io/releases/download/v1.0.0/termux-bootstrap-aarch64.tar.zst" \
            -o /tmp/bootstrap.tar.zst 2>&1
          ls -lh /tmp/bootstrap.tar.zst 2>/dev/null || echo "No bootstrap"

          echo "=== Test 5: Try direct Python for Android ==="
          pip3 install --target /tmp/pylibs fsspec aiofiles 2>&1 | tail -2
          echo "fsspec installed: $(ls /tmp/pylibs 2>/dev/null | head -3)"
