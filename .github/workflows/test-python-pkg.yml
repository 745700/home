name: Test python-for-android

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test python-for-android
        run: |
          pip3 install python-for-android 2>&1 | tail -3
          python3 -m pythonforandroid.toolchain --version 2>&1
          echo "=== Available recipes ==="
          python3 -m pythonforandroid.toolchain recipes 2>&1 | head -10

      - name: Download Python arm64 binary
        run: |
          echo "=== Check Termux apt repo ==="
          curl -s --max-time 15 \
            "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages.gz" \
            -o /tmp/Packages.gz
          gunzip -f /tmp/Packages.gz
          grep -A5 "^Package: python$" /tmp/Packages 2>/dev/null | head -10
          echo "---"
          curl -s --max-time 15 \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/python3.11/python3_3.11.8_aarch64.deb" \
            -o /tmp/python3.deb
          ls -lh /tmp/python3.deb
