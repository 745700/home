name: Test python-for-android build

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install python-for-android
        run: |
          pip3 install python-for-android 2>&1 | tail -2

      - name: Setup Android SDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          curl -s --max-time 120 -L \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          ls latest/bin/
          export ANDROID_HOME=$PWD
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26b" 2>&1 | tail -5
          ls -lh $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"

      - name: Check Python-for-Android recipes
        run: |
          python3 -m pythonforandroid.toolchain recipes 2>&1 | head -30
          echo "=== Python recipe ==="
          python3 -m pythonforandroid.toolchain recipe python 2>&1 | head -10
