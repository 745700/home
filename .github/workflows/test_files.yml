name: TestFiles

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          mkdir -p android-sdk
          curl -s --max-time 300 -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26b" >> $GITHUB_ENV
          echo "NDK done"

      - name: Download Python source
        run: |
          curl -s --max-time 120 -L https://www.python.org/ftp/python/3.13.0/Python-3.13.0.tgz -o /tmp/Python-3.13.0.tgz
          echo "Downloaded"

      - name: Configure Python
        run: |
          export ANDROID_NDK=$ANDROID_NDK_HOME
          export PATH=$PATH:$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          cd /tmp
          tar -xf Python-3.13.0.tgz
          cd Python-3.13.0
          ./configure --host=aarch64-linux-android --target=aarch64-linux-android --prefix=/tmp/pyinstall --disable-ipv6 --without-ensurepip --disable-test-modules 2>&1 | tail -3

      - name: Compile Python
        run: |
          cd /tmp/Python-3.13.0
          make -j$(nproc) 2>&1 | tail -3
          make install 2>&1 | tail -2
          echo "Python built"

      - name: Install pip packages
        run: |
          /tmp/pyinstall/bin/python3 -m pip install --no-cache-dir --prefix=/tmp/pyenv fastapi uvicorn 2>&1 | tail -3
          echo "Packages installed"

      - name: Create project files
        run: |
          mkdir -p /tmp/apk/app/src/main/java/com/aion/chat
          printf '%s\n' 'package com.aion.chat;
import android.app.Activity;
import android.os.Bundle;
import android.widget.TextView;
public class Test extends Activity {
    @Override
    protected void onCreate(Bundle b) {
        super.onCreate(b);
        setContentView(new TextView(this));
    }
}' > /tmp/apk/app/src/main/java/com/aion/chat/Test.java
          echo "Files created: $(wc -l < /tmp/apk/app/src/main/java/com/aion/chat/Test.java) lines"
