name: Build APK v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Gradle
        uses: gradle/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > AionApp/local.properties
      - name: Build
        run: cd AionApp && ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
      - uses: actions/upload-artifact@v4
        with:
          name: aion-apk-v2
          path: AionApp/app/build/outputs/apk/debug/*.apk
