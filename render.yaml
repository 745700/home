services:
  - type: web
    name: aionshome
    region: oregon
    repo: https://github.com/745700/home
    branch: main
    rootDir: aion-chat
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=/app/aion-chat/vendor python3 main.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
